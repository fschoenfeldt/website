name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches:
      - main
      - feature/**

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: latest

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps chromium

      - name: Build site
        env:
          PERSONAL_ADDRESS: ${{ secrets.PERSONAL_ADDRESS }}
          PERSONAL_PHONE: ${{ secrets.PERSONAL_PHONE }}
          PERSONAL_MAIL: ${{ secrets.PERSONAL_MAIL }}
          CV_HTACCESS_USER_01: ${{ secrets.CV_HTACCESS_USER_01 }}
          CV_HTACCESS_PASSWORD_01: ${{ secrets.CV_HTACCESS_PASSWORD_01 }}
          CV_HTACCESS_USER_02: ${{ secrets.CV_HTACCESS_USER_02 }}
          CV_HTACCESS_PASSWORD_02: ${{ secrets.CV_HTACCESS_PASSWORD_02 }}
        run: pnpm build

      - name: Upload build artifact
        uses: actions/upload-artifact@v4.6.2
        with:
          name: website-build
          path: _site/
          retention-days: 1

  test:
    needs: build
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4.2.2

      - uses: pnpm/action-setup@v4.1.0
        with:
          version: latest

      - uses: actions/setup-node@v4.4.0
        with:
          node-version: 24
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Install Playwright browsers
        run: pnpm playwright install --with-deps

      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: _site

      - name: Run unit tests
        run: pnpm test:unit

      - name: Run E2E tests
        run: pnpm test:e2e

      - uses: actions/upload-artifact@v4.6.2
        if: failure()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 1

  deploy:
    needs: build
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifact
        uses: actions/download-artifact@v4
        with:
          name: website-build
          path: _site

      - uses: actions/checkout@v4.2.2

      - name: Install lftp
        run: sudo apt-get install -y lftp

      - name: Deploy
        env:
          FTP_USER: ${{ secrets.FTP_USER }}
          FTP_PASSWORD: ${{ secrets.FTP_PASSWORD }}
          FTP_HOST: ${{ secrets.FTP_HOST }}
          FTP_SUBDIR: ${{ secrets.FTP_SUBDIR }}
        run: bash bin/deploy.sh
